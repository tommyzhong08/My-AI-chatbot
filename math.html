<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>College-Level Calculator</title>
  <style>
    body{ background: radial-gradient(circle at top left, rgba(72, 184, 255, 0.14), transparent 22%), radial-gradient(circle at bottom right, rgba(80, 255, 190, 0.12), transparent 18%), #071427; color:#eaf8ff; font-family: 'Segoe UI', Tahoma, sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:32px; }
    body::before{ content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 60px 60px; opacity:0.12; pointer-events:none; }
    .card{ width:420px; max-width:96%; background: rgba(5,18,34,0.96); border-radius:28px; padding:28px; box-shadow: 0 32px 84px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.03); border:1px solid rgba(78,200,255,0.22); backdrop-filter: blur(14px); position:relative; overflow:hidden; }
    .card::before{ content:''; position:absolute; inset:0; border-radius:28px; pointer-events:none; background: linear-gradient(135deg, rgba(0,140,255,0.08), rgba(0,0,0,0) 30%), radial-gradient(circle at top right, rgba(78,245,255,0.16), transparent 18%); mix-blend-mode: screen; }
    .card::after{ content:''; position:absolute; top:16px; left:16px; width:140px; height:2px; background: linear-gradient(90deg, rgba(87,240,255,0.95), rgba(87,240,255,0.05)); }
    .badge{ display:inline-flex; align-items:center; justify-content:center; padding:6px 14px; margin-bottom:14px; border:1px solid rgba(94,202,255,0.25); border-radius:999px; color:#9cecff; background:rgba(17, 45, 71, 0.6); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; text-shadow: 0 0 8px rgba(156,236,255,0.3); }
    h1{ margin:0 0 18px; font-size:24px; text-align:center; letter-spacing:0.18em; text-transform:uppercase; color:#c9f6ff; }
    .display{ background: linear-gradient(90deg,#0b2d51,#061923); padding:20px 18px; border-radius:20px; font-size:34px; text-align:right; color:#dff9ff; min-height:66px; overflow:hidden; box-shadow: inset 0 0 36px rgba(28,146,219,0.24); border:1px solid rgba(121,225,255,0.16); position:relative; }
    .display::before{ content:''; position:absolute; top:12px; left:14px; width:60px; height:6px; border-radius:999px; background: rgba(255,255,255,0.12); }
    .display span{ letter-spacing:0.08em; }
    .keys{ display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:20px; }
    button{ padding:18px 0; border-radius:16px; border:none; font-size:18px; cursor:pointer; color:#eef8ff; background:linear-gradient(180deg,#0b314f,#041b2d); box-shadow: 0 12px 30px rgba(0,0,0,0.22); transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease; }
    button:hover{ transform: translateY(-1px); box-shadow: 0 16px 34px rgba(0,0,0,0.28); }
    button.wide{ grid-column: span 2; }
    button.op{ background: linear-gradient(180deg,#1a4d74,#0b243f); border:1px solid rgba(110,210,255,0.14); }
    button.fn{ background:linear-gradient(180deg,#1e4374,#132444); border:1px solid rgba(170,230,255,0.14); }
    button.action{ background: linear-gradient(180deg,#4ee5ff,#35d4ff); color:#041924; font-weight:700; box-shadow: 0 16px 32px rgba(31,220,255,0.26); }
    button.action:hover{ background: linear-gradient(180deg,#6ff6ff,#50e6ff); }
    .meta{ background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); color:#d9f6ff; min-width:110px; padding:16px 14px; text-align:center; }
    .meta:hover{ background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06)); }
    .tools{ display:flex; gap:10px; margin-top:18px; align-items:center; flex-wrap: wrap; }
    .meta{ background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); color:#d9f6ff; min-width:110px; padding:16px 14px; text-align:center; }
    .meta:hover{ background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06)); }
    .link-back{ margin-left:auto; color:#9cecff; text-decoration:none; font-size:15px; letter-spacing:0.04em; }
    .link-back:hover{ color:#d5fbff; }
  </style>
</head>
<body>
  <div class="card" role="main">
      <div class="badge">Student Calculator</div>
      <h1>Calculator</h1>
      <div id="display" class="display"><span>0</span></div>
      <div class="keys">
        <button id="sqrt" class="fn" data-val="Math.sqrt(">sqrt</button>
        <button id="power" class="fn" data-val="**">x^y</button>
        <button class="fn" data-val="Math.PI">pi</button>
        <button class="fn" data-val="Math.E">e</button>
        <button class="fn" data-val="Math.sin(">sin</button>
        <button class="fn" data-val="Math.cos(">cos</button>
        <button class="fn" data-val="Math.tan(">tan</button>
        <button class="fn" data-val="Math.log10(">log</button>
        <button class="fn" data-val="Math.log(">ln</button>
        <button class="fn" data-val="(">(</button>
        <button class="fn" data-val=")">)</button>
        <button class="fn" data-val="/">/</button>
        <button class="op" data-val="7">7</button>
        <button class="op" data-val="8">8</button>
        <button class="op" data-val="9">9</button>
        <button class="fn" data-val="*">*</button>
        <button class="op" data-val="4">4</button>
        <button class="op" data-val="5">5</button>
        <button class="op" data-val="6">6</button>
        <button class="fn" data-val="-">-</button>
        <button class="op" data-val="1">1</button>
        <button class="op" data-val="2">2</button>
        <button class="op" data-val="3">3</button>
        <button class="fn" data-val="+">+</button>
        <button class="op wide" data-val="0">0</button>
        <button class="op" data-val=".">.</button>
        <button id="equals" class="action">=</button>
      </div>
    <div class="tools">
      <button id="clear" class="meta">Clear</button>
      <button id="back" class="meta">Back</button>
      <a class="link-back" href="/">Home</a>
    </div>
  </div>

  <script>
    (function(){
      const disp = document.getElementById('display'); let expr='';
      function render(){ const displayValue = expr.replace(/\*\*/g,'^')
          .replace(/Math\.sqrt\(/g,'√(')
          .replace(/Math\.sin\(/g,'sin(')
          .replace(/Math\.cos\(/g,'cos(')
          .replace(/Math\.tan\(/g,'tan(')
          .replace(/Math\.log10\(/g,'log(')
          .replace(/Math\.log\(/g,'ln(')
          .replace(/Math\.PI/g,'π')
          .replace(/Math\.E/g,'e');
        disp.textContent = displayValue || '0' }
      function append(v){ if(v==='.'&&/\.[0-9]*$/.test(expr)) return; expr+=v; render() }
      function clearAll(){ expr=''; render() }
      function removeLast(){ expr=expr.slice(0,-1); render() }
      function safeEval(s){ try{ const safe=s.replace(/[^0-9+\-*/().,a-zA-Z ]/g,''); return Function('return ('+safe+')')(); }catch(e){return 'Error'} }
      document.querySelectorAll('.op').forEach(b=>b.addEventListener('click',()=>append(b.dataset.val)));
      document.querySelectorAll('.fn').forEach(b=>b.addEventListener('click',()=>append(b.dataset.val)));
      document.getElementById('sqrt').addEventListener('click',()=>append('Math.sqrt('));
      document.getElementById('power').addEventListener('click',()=>append('**'));
      document.getElementById('clear').addEventListener('click',clearAll);
      document.getElementById('back').addEventListener('click',removeLast);
      document.getElementById('equals').addEventListener('click',()=>{ const r=safeEval(expr); expr=(typeof r==='number'&&isFinite(r))?String(r):''; disp.textContent=(expr==='')?r:expr; });
      window.addEventListener('keydown',e=>{ if(e.key.match(/[0-9.+\-*/()]/)){ append(e.key); e.preventDefault() } else if(e.key==='Enter'){ document.getElementById('equals').click(); e.preventDefault() } else if(e.key==='Backspace'){ removeLast(); } else if(e.key==='Escape'){ clearAll(); } });
      render();
    })();
  </script>
</body>
</html>

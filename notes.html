<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Notes</title>
  <style>
    body{ margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #071224; color:#eaf6ff; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .notes-shell{ width:min(960px,94%); max-width:1000px; padding:28px; box-sizing:border-box; }
    textarea{ width:100%; height:70vh; resize:vertical; padding:18px; font-size:16px; border-radius:12px; border:1px solid rgba(160,225,255,0.12); background:rgba(4,12,20,0.6); color:#eaf6ff; box-shadow:0 10px 30px rgba(0,0,0,0.45); }
    .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    a.home{ color:#9fe6ff; text-decoration:none; font-weight:600 }
  </style>
</head>
<body>
  <div class="notes-shell">
    <div class="topbar">
      <h2 style="margin:0">Notes</h2>
      <div style="display:flex;gap:12px;align-items:center">
        <label style="color:#cfeeff;margin:0 6px 0 0">Font</label>
        <select id="fontSize" aria-label="Font size" style="padding:6px;border-radius:8px;background:#071224;color:#eaf6ff;border:1px solid rgba(160,225,255,0.06)">
          <option value="14">Small</option>
          <option value="16" selected>Normal</option>
          <option value="20">Large</option>
          <option value="24">XL</option>
        </select>
        <button id="highlightBtn" style="padding:8px 10px;border-radius:8px">Highlight: Off</button>
        <a class="home" href="/">Back Home</a>
      </div>
    </div>
    <div id="editor" contenteditable="true" placeholder="Type your notes here..." style="width:100%; min-height:68vh; max-height:85vh; overflow:auto; padding:18px; font-size:16px; border-radius:12px; border:1px solid rgba(160,225,255,0.12); background:rgba(4,12,20,0.6); color:#eaf6ff; box-shadow:0 10px 30px rgba(0,0,0,0.45);">
    </div>
  </div>
  <script>
    const editor = document.getElementById('editor');
    const fontSizeSelect = document.getElementById('fontSize');
    const highlightBtn = document.getElementById('highlightBtn');
    let currentFontSize = fontSizeSelect.value;
    let highlighterOn = false;

    editor.style.fontSize = `${currentFontSize}px`;

    fontSizeSelect.addEventListener('change', (event) => {
      currentFontSize = event.target.value;
      editor.style.fontSize = `${currentFontSize}px`;
      editor.focus();
    });

    highlightBtn.addEventListener('click', () => {
      highlighterOn = !highlighterOn;
      highlightBtn.textContent = `Highlight: ${highlighterOn ? 'On' : 'Off'}`;

      const sel = window.getSelection();
      if (sel.rangeCount && !sel.getRangeAt(0).collapsed) {
        wrapSelectionWithStyle({
          backgroundColor: 'rgba(255,235,59,0.28)',
          fontSize: `${currentFontSize}px`
        });
      }
      editor.focus();
    });

    editor.addEventListener('beforeinput', (event) => {
      if (event.inputType === 'insertText' && event.data) {
        event.preventDefault();
        insertStyledText(event.data);
      } else if (event.inputType === 'insertParagraph') {
        event.preventDefault();
        insertParagraph();
      }
    });

    function insertStyledText(text) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      if (!range.collapsed) {
        range.deleteContents();
      }
      const span = document.createElement('span');
      span.style.fontSize = `${currentFontSize}px`;
      if (highlighterOn) {
        span.style.backgroundColor = 'rgba(255,235,59,0.28)';
      }
      span.textContent = text;
      range.insertNode(span);
      range.setStartAfter(span);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
      editor.dispatchEvent(new Event('input'));
    }

    function insertParagraph() {
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      const br = document.createElement('br');
      range.deleteContents();
      range.insertNode(br);
      range.setStartAfter(br);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
      editor.dispatchEvent(new Event('input'));
    }

    function wrapSelectionWithStyle(styleObj) {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      if (range.collapsed) return;
      const span = document.createElement('span');
      Object.assign(span.style, styleObj);
      try {
        span.appendChild(range.extractContents());
        range.insertNode(span);
        sel.removeAllRanges();
        const newRange = document.createRange();
        newRange.selectNodeContents(span);
        sel.addRange(newRange);
      } catch (e) {
        document.execCommand('styleWithCSS', false, true);
      }
    }

    function checkPlaceholder() { if (editor.textContent.trim() === '') { editor.style.opacity = 0.7; } else { editor.style.opacity = 1; } }
    editor.addEventListener('input', checkPlaceholder);
    checkPlaceholder();
  </script>
</body>
</html>
